services:
  postgres:
    image: postgres:16
    container_name: resource-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: resource_booking_db
      POSTGRES_USER: resource_user
      POSTGRES_PASSWORD: resource_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resource_user -d resource_booking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: